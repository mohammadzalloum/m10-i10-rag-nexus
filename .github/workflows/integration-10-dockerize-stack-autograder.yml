name: "Integration 10 — Dockerize Stack Autograder"

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  structural:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    services: {}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install structural-test deps
        run: pip install pytest PyYAML

      - name: Structural autograder
        run: pytest tests/ -v --tb=short

  stack:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    needs: structural
    env:
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testtest12345
      WEB_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from CI vars
        run: |
          cat > .env <<'EOF'
          NEO4J_AUTH=neo4j/testtest12345
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=testtest12345
          WEB_ORIGIN=http://localhost:3000
          EOF

      - name: docker compose up
        run: docker compose up -d --build

      - name: Wait for healthy — tiered ordering check
        run: |
          DATA_TIER="neo4j weaviate"
          API_TIER="api"
          WEB_TIER="web"

          svc_status() {
            docker compose ps "$1" --format json | \
              python3 -c "import sys,json; lines=[l for l in sys.stdin if l.strip()]; print(json.loads(lines[0]).get('Health','')) if lines else print('')"
          }

          for i in $(seq 1 60); do
            data_ok=true
            for svc in $DATA_TIER; do
              [ "$(svc_status $svc)" != "healthy" ] && data_ok=false
            done

            if [ "$data_ok" = "true" ]; then
              echo "phase 1 ok: data tier healthy ($DATA_TIER)"
              break
            fi

            for svc in $API_TIER $WEB_TIER; do
              if [ "$(svc_status $svc)" = "healthy" ]; then
                echo "FAILED ordering: $svc reached healthy before $DATA_TIER — depends_on chain is wrong"
                docker compose ps
                exit 1
              fi
            done

            sleep 2
          done

          if [ "$data_ok" != "true" ]; then
            echo "FAILED: data tier did not reach healthy within budget"
            docker compose ps
            docker compose logs neo4j weaviate
            exit 1
          fi

          for i in $(seq 1 150); do
            api_ok=true
            [ "$(svc_status $API_TIER)" != "healthy" ] && api_ok=false

            if [ "$api_ok" = "true" ]; then
              echo "phase 2 ok: api healthy"
              break
            fi

            if [ "$(svc_status $WEB_TIER)" = "healthy" ]; then
              echo "FAILED ordering: web reached healthy before api — depends_on chain is wrong"
              docker compose ps
              exit 1
            fi

            sleep 2
          done

          if [ "$api_ok" != "true" ]; then
            echo "FAILED: api did not reach healthy within 5-min budget"
            docker compose ps
            docker compose logs api
            exit 1
          fi

          for i in $(seq 1 60); do
            if [ "$(svc_status $WEB_TIER)" = "healthy" ]; then
              echo "phase 3 ok: web healthy — full ordering correct"
              docker compose ps
              exit 0
            fi

            sleep 2
          done

          echo "FAILED: web did not reach healthy within budget"
          docker compose ps
          docker compose logs web
          exit 1

      - name: Seed scripts (first run)
        run: |
          bash scripts/seed_neo4j.sh
          bash scripts/seed_weaviate.sh

      - name: Seed scripts (re-run — data-layer idempotency)
        run: |
          bash scripts/seed_neo4j.sh
          bash scripts/seed_weaviate.sh

      - name: Demo curl — content check (not just 200)
        id: demo_curl_first
        run: |
          response=$(curl -fsS -X POST http://localhost:8000/rag/answer \
            -H 'Content-Type: application/json' \
            -d '{"question": "How do I prep ginger for stir-fry?"}')

          printf '%s\n' "$response" | tee /tmp/rag_response.json

          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          data = json.loads(Path("/tmp/rag_response.json").read_text(encoding="utf-8"))

          SENTINEL = "I cannot answer this from the available sources"
          answer = data.get("answer", "").strip()
          answer_without_citations = re.sub(r"\[\d+\]", "", answer).strip()

          assert data.get("citations"), f"no citations: {data}"
          assert data.get("confidence", 0) > 0, f"confidence not positive: {data.get('confidence')}"
          assert answer != SENTINEL, "answer is sentinel — retrieval or generation failed"
          assert answer_without_citations, f"answer only contains citation markers: {data}"

          print(f"ok: {len(data['citations'])} citation(s), confidence={data['confidence']}")
          PY

      - name: Full-stack idempotency — down -v + re-up + re-seed + re-curl
        run: |
          docker compose down -v
          docker compose up -d --wait --build

          bash scripts/seed_neo4j.sh
          bash scripts/seed_weaviate.sh

          response=$(curl -fsS -X POST http://localhost:8000/rag/answer \
            -H 'Content-Type: application/json' \
            -d '{"question": "How do I prep ginger for stir-fry?"}')

          printf '%s\n' "$response" | tee /tmp/rag_response_after_reup.json

          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          data = json.loads(Path("/tmp/rag_response_after_reup.json").read_text(encoding="utf-8"))

          SENTINEL = "I cannot answer this from the available sources"
          answer = data.get("answer", "").strip()
          answer_without_citations = re.sub(r"\[\d+\]", "", answer).strip()

          assert data.get("citations"), f"no citations after re-up: {data}"
          assert data.get("confidence", 0) > 0, f"confidence not positive after re-up: {data.get('confidence')}"
          assert answer != SENTINEL, "answer is sentinel after re-up — stack is not idempotent"
          assert answer_without_citations, f"answer only contains citation markers after re-up: {data}"

          print(f"full-stack idempotency ok: {len(data['citations'])} citation(s), confidence={data['confidence']}")
          PY

      - name: Playwright smoke (against running stack)
        run: |
          cd web
          npm ci
          npx playwright install --with-deps chromium
          NODE_PATH="$PWD/node_modules" npx playwright test

      - name: Tear down
        if: always()
        run: docker compose down -v